version: '3.9'
services:
  # ---------------------------------------------
  # frontend
  # ---------------------------------------------
  web:
    build: ./frontend
    container_name: web
    tty : true
    ports:
      - '8090:3000'
      - '24678:24678' # Viteのホットリロード用
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true